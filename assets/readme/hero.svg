<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Vue 学习项目合集 - Vue Router / Vuex / Slot 三个练习</title>
  <desc id="heroDesc">Vue 3 + Vite 学习项目合集 Hero。三栏结构图分别示意 Vue Router 路由分支、Vuex 状态树、Slot 插槽嵌套,基于真实子项目文件名绘制。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B8680"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="360" rx="26" fill="#F7F5F0"/>

  <!-- Top: label + title + subtitle -->
  <g transform="translate(60 36)">
    <text x="0" y="14" class="mono" font-size="14" letter-spacing="2" fill="#8B8680">VUE 3 LEARNING PROJECTS</text>
    <text x="0" y="68" class="sans" font-size="44" font-weight="700" fill="#1A1A1A">Vue 学习项目合集</text>
    <text x="0" y="100" class="sans" font-size="18" fill="#8B8680">Vue Router · Vuex · Slot - 三个独立可运行的练习</text>
  </g>

  <!-- Three-column structure diagrams -->
  <g transform="translate(60 140)">

    <!-- Column 1: Vue Router -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="348" height="180" rx="10" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
      <rect x="16" y="16" width="34" height="22" rx="4" fill="#B8860B"/>
      <text x="33" y="32" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#FFFFFF">01</text>
      <text x="60" y="33" class="sans" font-size="20" font-weight="600" fill="#1A1A1A">Vue Router</text>

      <g transform="translate(56 64)">
        <rect x="76" y="0" width="104" height="34" rx="6" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
        <text x="128" y="22" text-anchor="middle" class="mono" font-size="13" fill="#1A1A1A">App.vue</text>
        <path d="M 128 34 L 128 54 L 44 54 L 44 74" fill="none" stroke="#8B8680" stroke-width="1"/>
        <path d="M 128 34 L 128 54 L 212 54 L 212 74" fill="none" stroke="#8B8680" stroke-width="1"/>
        <rect x="4" y="74" width="80" height="30" rx="6" fill="#2F7A5B"/>
        <text x="44" y="93" text-anchor="middle" class="mono" font-size="12" fill="#FFFFFF">Home.vue</text>
        <rect x="172" y="74" width="80" height="30" rx="6" fill="#2F7A5B"/>
        <text x="212" y="93" text-anchor="middle" class="mono" font-size="12" fill="#FFFFFF">About.vue</text>
      </g>
    </g>

    <!-- Column 2: Vuex -->
    <g transform="translate(366 0)">
      <rect x="0" y="0" width="348" height="180" rx="10" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
      <rect x="16" y="16" width="34" height="22" rx="4" fill="#B8860B"/>
      <text x="33" y="32" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#FFFFFF">02</text>
      <text x="60" y="33" class="sans" font-size="20" font-weight="600" fill="#1A1A1A">Vuex</text>

      <g transform="translate(40 64)">
        <rect x="76" y="0" width="128" height="34" rx="6" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
        <text x="140" y="22" text-anchor="middle" class="mono" font-size="13" fill="#1A1A1A">store/index.js</text>
        <path d="M 140 34 L 140 54" fill="none" stroke="#8B8680" stroke-width="1"/>
        <path d="M 30 54 L 250 54" fill="none" stroke="#8B8680" stroke-width="1"/>
        <path d="M 30 54 L 30 74" fill="none" stroke="#8B8680" stroke-width="1"/>
        <path d="M 103 54 L 103 74" fill="none" stroke="#8B8680" stroke-width="1"/>
        <path d="M 177 54 L 177 74" fill="none" stroke="#8B8680" stroke-width="1"/>
        <path d="M 250 54 L 250 74" fill="none" stroke="#8B8680" stroke-width="1"/>
        <rect x="0" y="74" width="60" height="30" rx="6" fill="#2F7A5B"/>
        <text x="30" y="93" text-anchor="middle" class="mono" font-size="11" fill="#FFFFFF">State</text>
        <rect x="73" y="74" width="60" height="30" rx="6" fill="#2F7A5B"/>
        <text x="103" y="93" text-anchor="middle" class="mono" font-size="11" fill="#FFFFFF">Getters</text>
        <rect x="147" y="74" width="60" height="30" rx="6" fill="#2F7A5B"/>
        <text x="177" y="93" text-anchor="middle" class="mono" font-size="10" fill="#FFFFFF">Mutations</text>
        <rect x="220" y="74" width="60" height="30" rx="6" fill="#2F7A5B"/>
        <text x="250" y="93" text-anchor="middle" class="mono" font-size="11" fill="#FFFFFF">Actions</text>
      </g>
    </g>

    <!-- Column 3: Slot -->
    <g transform="translate(732 0)">
      <rect x="0" y="0" width="348" height="180" rx="10" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
      <rect x="16" y="16" width="34" height="22" rx="4" fill="#B8860B"/>
      <text x="33" y="32" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#FFFFFF">03</text>
      <text x="60" y="33" class="sans" font-size="20" font-weight="600" fill="#1A1A1A">Slot</text>

      <g transform="translate(36 64)">
        <rect x="0" y="0" width="168" height="104" rx="6" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
        <text x="84" y="18" text-anchor="middle" class="mono" font-size="11" fill="#1A1A1A">Parent.vue</text>
        <rect x="20" y="30" width="128" height="44" rx="4" fill="none" stroke="#B8860B" stroke-width="1" stroke-dasharray="4 3"/>
        <text x="84" y="56" text-anchor="middle" class="mono" font-size="11" fill="#B8860B">slot</text>
        <rect x="200" y="34" width="84" height="40" rx="6" fill="#2F7A5B"/>
        <text x="242" y="52" text-anchor="middle" class="mono" font-size="11" fill="#FFFFFF">Child</text>
        <text x="242" y="66" text-anchor="middle" class="mono" font-size="10" fill="#FFFFFF">content</text>
        <path d="M 200 54 L 152 54" fill="none" stroke="#8B8680" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
      </g>
    </g>

  </g>

  <!-- Footer -->
  <text x="60" y="346" class="mono" font-size="12" fill="#8B8680">Vue 3 · Vite · 作者 liem</text>
</svg>
