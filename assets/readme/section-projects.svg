<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="secTitle secDesc">
  <title id="secTitle">子项目结构 — 三个真实 Vue 练习</title>
  <desc id="secDesc">章节横幅。展示三个子项目编号 01/02/03 与目录名 vue-router-practice / vuex-practice / slot-practice。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="140" rx="14" fill="#F7F5F0"/>

  <!-- Left accent bar -->
  <rect x="48" y="36" width="4" height="68" rx="2" fill="#2F7A5B"/>

  <!-- Section label + title -->
  <g transform="translate(72 36)">
    <text x="0" y="14" class="mono" font-size="13" letter-spacing="2" fill="#B8860B">SECTION · 子项目</text>
    <text x="0" y="50" class="sans" font-size="32" font-weight="700" fill="#1A1A1A">三个练习,三套真实文件</text>
    <text x="0" y="78" class="mono" font-size="14" fill="#8B8680">vue-router-practice / vuex-practice / slot-practice</text>
  </g>

  <!-- Right: three numbered chips -->
  <g transform="translate(900 50)">
    <rect x="0" y="0" width="48" height="40" rx="6" fill="#B8860B"/>
    <text x="24" y="26" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#FFFFFF">01</text>
    <rect x="60" y="0" width="48" height="40" rx="6" fill="#B8860B"/>
    <text x="84" y="26" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#FFFFFF">02</text>
    <rect x="120" y="0" width="48" height="40" rx="6" fill="#B8860B"/>
    <text x="144" y="26" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#FFFFFF">03</text>
  </g>
</svg>
