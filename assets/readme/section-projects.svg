<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="secTitle secDesc">
  <title id="secTitle">子项目结构 - 三个真实 Vue 练习</title>
  <desc id="secDesc">章节横幅。展示三个子项目编号 01/02/03 与目录名 vue-router-practice / vuex-practice / slot-practice。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="140" rx="14" fill="#F7F5F0"/>

  <!-- Left accent bar -->
  <rect x="48" y="36" width="4" height="68" rx="2" fill="#2F7A5B"/>

  <!-- Title + subtitle -->
  <g transform="translate(72 36)">
    <text x="0" y="34" class="sans" font-size="32" font-weight="700" fill="#1A1A1A">三个练习,三套真实文件</text>
    <text x="0" y="62" class="mono" font-size="14" fill="#8B8680">vue-router-practice / vuex-practice / slot-practice</text>
  </g>

  <!-- Right: three directory pills with project numbers -->
  <g transform="translate(810 40)">
    <!-- 01 Router -->
    <rect x="0" y="0" width="108" height="60" rx="8" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
    <rect x="0" y="0" width="108" height="20" rx="8" fill="#2F7A5B"/>
    <rect x="0" y="12" width="108" height="8" fill="#2F7A5B"/>
    <text x="54" y="14" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#FFFFFF">01 ROUTER</text>
    <text x="54" y="44" text-anchor="middle" class="mono" font-size="11" fill="#1A1A1A">router</text>

    <!-- 02 Vuex -->
    <rect x="120" y="0" width="108" height="60" rx="8" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
    <rect x="120" y="0" width="108" height="20" rx="8" fill="#2F7A5B"/>
    <rect x="120" y="12" width="108" height="8" fill="#2F7A5B"/>
    <text x="174" y="14" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#FFFFFF">02 VUEX</text>
    <text x="174" y="44" text-anchor="middle" class="mono" font-size="11" fill="#1A1A1A">store</text>

    <!-- 03 Slot -->
    <rect x="240" y="0" width="108" height="60" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1"/>
    <rect x="240" y="0" width="108" height="20" rx="8" fill="#B8860B"/>
    <rect x="240" y="12" width="108" height="8" fill="#B8860B"/>
    <text x="294" y="14" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#FFFFFF">03 SLOT</text>
    <text x="294" y="44" text-anchor="middle" class="mono" font-size="11" fill="#1A1A1A">slot</text>
  </g>
</svg>
