<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="100%" role="img" aria-labelledby="tsTitle tsDesc">
  <title id="tsTitle">技术栈分层 - Vue 3 / Vite / Vue Router / Vuex</title>
  <desc id="tsDesc">四个层次:框架层 Vue 3 + Composition API、工程层 Vite、路由层 Vue Router、状态层 Vuex。所有技术均为仓库实际使用。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="240" rx="20" fill="#F7F5F0"/>

  <!-- Four stacked layer bars. y=22, 74, 126, 178. h=40, gap=12 -->

  <!-- Layer 1: Framework -->
  <g transform="translate(48 22)">
    <rect x="0" y="0" width="1104" height="40" rx="8" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
    <!-- Left layer tag -->
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#2F7A5B"/>
    <rect x="160" y="0" width="20" height="40" fill="#2F7A5B"/>
    <text x="90" y="25" text-anchor="middle" class="mono" font-size="12" font-weight="700" letter-spacing="2" fill="#FFFFFF">FRAMEWORK</text>
    <!-- Tech name -->
    <text x="210" y="26" class="sans" font-size="22" font-weight="700" fill="#1A1A1A">Vue 3</text>
    <!-- Description -->
    <text x="380" y="26" class="sans" font-size="14" fill="#8B8680">Composition API · 响应式系统 · 单文件组件</text>
  </g>

  <!-- Layer 2: Build -->
  <g transform="translate(48 74)">
    <rect x="0" y="0" width="1104" height="40" rx="8" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#2F7A5B"/>
    <rect x="160" y="0" width="20" height="40" fill="#2F7A5B"/>
    <text x="90" y="25" text-anchor="middle" class="mono" font-size="12" font-weight="700" letter-spacing="2" fill="#FFFFFF">BUILD</text>
    <text x="210" y="26" class="sans" font-size="22" font-weight="700" fill="#1A1A1A">Vite</text>
    <text x="380" y="26" class="sans" font-size="14" fill="#8B8680">开发服务器 · 生产构建 · HMR 热更新</text>
  </g>

  <!-- Layer 3: Routing -->
  <g transform="translate(48 126)">
    <rect x="0" y="0" width="1104" height="40" rx="8" fill="#FFFFFF" stroke="#2F7A5B" stroke-width="1"/>
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#2F7A5B"/>
    <rect x="160" y="0" width="20" height="40" fill="#2F7A5B"/>
    <text x="90" y="25" text-anchor="middle" class="mono" font-size="12" font-weight="700" letter-spacing="2" fill="#FFFFFF">ROUTING</text>
    <text x="210" y="26" class="sans" font-size="22" font-weight="700" fill="#1A1A1A">Vue Router</text>
    <text x="380" y="26" class="sans" font-size="14" fill="#8B8680">URL 到组件映射 · 跳转 · 传参 · 嵌套</text>
  </g>

  <!-- Layer 4: State -->
  <g transform="translate(48 178)">
    <rect x="0" y="0" width="1104" height="40" rx="8" fill="#FFFFFF" stroke="#B8860B" stroke-width="1"/>
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#B8860B"/>
    <rect x="160" y="0" width="20" height="40" fill="#B8860B"/>
    <text x="90" y="25" text-anchor="middle" class="mono" font-size="12" font-weight="700" letter-spacing="2" fill="#FFFFFF">STATE</text>
    <text x="210" y="26" class="sans" font-size="22" font-weight="700" fill="#1A1A1A">Vuex</text>
    <text x="380" y="26" class="sans" font-size="14" fill="#8B8680">State · Getters · Mutations · Actions</text>
  </g>
</svg>
